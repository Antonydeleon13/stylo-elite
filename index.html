<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylo | Master Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0b0b; --card: #121212; --gold: #d4af37; --border: rgba(212, 175, 55, 0.15); --text: #fff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.75rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--gold); }
        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        th { background: rgba(214, 175, 55, 0.05); color: var(--gold); padding: 15px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        .badge { padding: 5px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-active { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .badge-expired { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        .badge-none { background: rgba(255,255,255,0.05); color: #777; }
        .btn-group { display: flex; gap: 8px; }
        .btn-action { background: #000; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: all 0.3s; }
        .btn-mensual:hover { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-anual:hover { background: #2ecc71; color: #000; border-color: #2ecc71; }
        .btn-cut:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: #000; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>STYLO | Panel Maestro</h1>
                <p style="font-size: 0.7rem; color: #555; margin: 5px 0 0; text-transform: uppercase;">Control Global de Barberías y Suscripciones</p>
            </div>
            <div style="font-size: 0.8rem; color: var(--gold); font-weight: 600;"><i class="fas fa-crown"></i> Admin Mode</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total Barberías</h3><p id="stat-total">0</p></div>
            <div class="stat-card"><h3>Planes Activos</h3><p id="stat-activos" style="color: #2ecc71;">0</p></div>
            <div class="stat-card"><h3>Planes Vencidos</h3><p id="stat-vencidos" style="color: #e74c3c;">0</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Barbería / ID</th>
                        <th>Contacto</th>
                        <th>Tipo Plan</th>
                        <th>Vencimiento</th>
                        <th>Estado</th>
                        <th>Acciones de Acceso</th>
                    </tr>
                </thead>
                <tbody id="tabla-tenants">
                    <tr>
                        <td colspan="6" style="text-align:center; color:#555; padding:4px;">Cargando registros de Firebase...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    // IMPORTACIÓN NECESARIA PARA AUTENTICACIÓN
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyACuAv5l3WljFNFLcBuc2XWpyocaW4Z7ns",
        authDomain: "stylo-app-9143d.firebaseapp.com",
        projectId: "stylo-app-9143d",
        storageBucket: "stylo-app-9143d.firebasestorage.app",
        messagingSenderId: "1008323571262",
        appId: "1:1008323571262:web:25545b92706cdc96d42b6f",
        databaseURL: "https://stylo-app-9143d-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2500);
    }

    // 1. PROTECCIÓN: Solo cargar si estás logueado como Admin
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "antonydeleon13@gmail.com") {
            console.log("Admin autenticado, cargando datos...");
            cargarTabla();
        } else {
            // Si no está logueado, forzamos login
            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">
                    <button onclick="signInWithPopup(auth, provider)" style="padding:15px 30px; cursor:pointer; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">
                        ENTRAR COMO ADMINISTRADOR
                    </button>
                </div>
            `;
        }
    });

    // 2. FUNCIÓN DE CARGA MANTENIENDO TODA TU LÓGICA ORIGINAL
    function cargarTabla() {
        onValue(ref(db, 'tenants'), (snapshot) => { 
            const data = snapshot.val();
            const tbody = document.getElementById('tabla-tenants');
            if(!tbody) return;
            tbody.innerHTML = "";

            if (!data) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#555;">No hay barberías.</td></tr>`;
                return;
            }

            let total = 0, activos = 0, vencidos = 0;
            const ahora = new Date();

            Object.keys(data).forEach(tenantId => {
                total++;
                const tenant = data[tenantId];
                const suscripcion = tenant.suscripcion;
                
                let tipoPlan = suscripcion ? suscripcion.tipo_plan : "Ninguno";
                let fechaVenceTxt = "---";
                let estadoHTML = `<span class="badge badge-none">Sin Pago</span>`;

                if (suscripcion) {
                    const fVence = new Date(suscripcion.fecha_vencimiento);
                    fechaVenceTxt = fVence.toLocaleDateString([], { day: '2-digit', month: '2-digit', year: 'numeric' });
                    
                    if (ahora < fVence && suscripcion.estado === "ACTIVE") {
                        estadoHTML = `<span class="badge badge-active">Activo</span>`;
                        activos++;
                    } else {
                        estadoHTML = `<span class="badge badge-expired">Vencido</span>`;
                        vencidos++;
                    }
                } else {
                    vencidos++;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${tenant.nombre_barberia || 'Stylo Studio'}</strong><br><small>${tenantId}</small></td>
                    <td>${tenant.usuario_email || 'Sin correo'}</td>
                    <td style="text-transform:uppercase;">${tipoPlan}</td>
                    <td>${fechaVenceTxt}</td>
                    <td>${estadoHTML}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn-action" onclick="window.activarManual('${tenantId}', 'mensual')">+1 Mes</button>
                            <button class="btn-action" onclick="window.entrarComoBarbero('${tenantId}')">Soporte</button>
                            ${suscripcion ? `<button class="btn-action btn-cut" onclick="window.cortarAcceso('${tenantId}')">Cortar</button>` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-activos').innerText = activos;
            document.getElementById('stat-vencidos').innerText = vencidos;
        });
    }

    // 3. FUNCIONES GLOBALES (Mantenidas)
    window.activarManual = async (tenantId, tipo) => {
        const f = new Date(); f.setDate(f.getDate() + (tipo === 'mensual' ? 30 : 365));
        await update(ref(db, `tenants/${tenantId}/suscripcion`), {
            estado: "ACTIVE", tipo_plan: tipo, fecha_vencimiento: f.toISOString()
        });
        showToast("ACTUALIZADO");
    };

    window.cortarAcceso = async (tenantId) => {
        await remove(ref(db, `tenants/${tenantId}/suscripcion`));
        showToast("CORTADO");
    };

    window.entrarComoBarbero = (tenantId) => {
        localStorage.setItem('admin_impersonate', tenantId);
        window.open('barbero.html', '_blank');
    };
    
    // Hacemos auth global para que el botón de login funcione
    window.auth = auth;
    window.signInWithPopup = signInWithPopup;
    window.provider = provider;
</script>
</body>
</html>
